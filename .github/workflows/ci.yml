name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, Build, Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check generated diff
        run: git diff --check

      - name: Check shell script syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  race:
    name: Race Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Race test critical packages
        run: >
          go test -race
          ./cmd
          ./internal/state
          ./pkg/mesh
          ./pkg/provisioner
          ./pkg/secrets
          ./pkg/deployer
          ./pkg/ssh
          ./pkg/takodclient
          ./pkg/takod
          ./pkg/takodstate
          ./pkg/config
