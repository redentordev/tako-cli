name: Release

# This workflow creates a release when a tag is pushed
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          LDFLAGS="-X github.com/redentordev/tako-cli/cmd.Version=$VERSION -X github.com/redentordev/tako-cli/cmd.GitCommit=$GIT_COMMIT -X github.com/redentordev/tako-cli/cmd.BuildTime=$BUILD_TIME"
          
          mkdir -p dist
          
          echo "🔨 Building Tako CLI $VERSION..."
          
          # Linux AMD64
          echo "  → Linux AMD64"
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tako-linux-amd64 .
          
          # Linux ARM64
          echo "  → Linux ARM64"
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/tako-linux-arm64 .
          
          # macOS AMD64
          echo "  → macOS AMD64"
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tako-darwin-amd64 .
          
          # macOS ARM64 (Apple Silicon)
          echo "  → macOS ARM64"
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/tako-darwin-arm64 .
          
          # Windows AMD64
          echo "  → Windows AMD64"
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/tako-windows-amd64.exe .
          
          echo "✅ All builds complete!"
          ls -lh dist/

      - name: Verify manual pages
        run: |
          make man
          git diff --exit-code -- man

      - name: Package manual pages
        run: |
          tar -czf dist/tako-manpages.tar.gz -C man .
          ls -lh dist/tako-manpages.tar.gz

      - name: Generate checksums
        run: |
          cd dist
          sha256sum tako-* > checksums.txt
          cat checksums.txt

      - name: Verify release assets
        run: |
          set -euo pipefail

          VERSION=${{ steps.version.outputs.VERSION }}
          GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          expected_assets=(
            tako-linux-amd64
            tako-linux-arm64
            tako-darwin-amd64
            tako-darwin-arm64
            tako-windows-amd64.exe
            tako-manpages.tar.gz
          )

          cd dist
          for asset in "${expected_assets[@]}"; do
            test -s "$asset"
          done

          printf '%s\n' "${expected_assets[@]}" | sort > expected-assets.txt
          awk '{print $2}' checksums.txt | sort > checksum-assets.txt
          diff -u expected-assets.txt checksum-assets.txt
          sha256sum -c checksums.txt

          chmod +x tako-linux-amd64
          version_output=$(./tako-linux-amd64 --version)
          echo "$version_output"
          grep -F "Tako CLI $VERSION" <<<"$version_output"
          grep -F "Commit:  $GIT_COMMIT" <<<"$version_output"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: image_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Tako CLI
            org.opencontainers.image.description=Deploy apps to a small takod mesh

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_meta.outputs.tags }}
          labels: ${{ steps.image_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}

      - name: Verify multi-arch image manifest
        run: |
          set -euo pipefail

          VERSION=${{ steps.version.outputs.VERSION }}
          GIT_COMMIT=${{ steps.version.outputs.GIT_COMMIT }}
          IMAGE="ghcr.io/${{ github.repository }}:$VERSION"

          docker buildx imagetools inspect "$IMAGE" > image-manifest.txt
          cat image-manifest.txt
          grep -F "linux/amd64" image-manifest.txt
          grep -F "linux/arm64" image-manifest.txt

          image_version=$(docker run --rm "$IMAGE" --version)
          echo "$image_version"
          grep -F "Tako CLI $VERSION" <<<"$image_version"
          grep -F "Commit:  $GIT_COMMIT" <<<"$image_version"

      - name: Get commit messages since last tag
        id: changelog
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to file for multiline output
          echo "$COMMITS" > commits.txt
          echo "Changelog generated"

      - name: Build release notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          {
            cat <<EOF
            # 🐙 Tako CLI $VERSION

            Deploy to any VPS with a small takod mesh.

            ## 📦 Installation

            ### Linux (AMD64)
            \`\`\`bash
            curl -L https://github.com/redentordev/tako-cli/releases/download/$VERSION/tako-linux-amd64 -o /usr/local/bin/tako
            chmod +x /usr/local/bin/tako
            tako --version
            \`\`\`

            ### Linux (ARM64)
            \`\`\`bash
            curl -L https://github.com/redentordev/tako-cli/releases/download/$VERSION/tako-linux-arm64 -o /usr/local/bin/tako
            chmod +x /usr/local/bin/tako
            tako --version
            \`\`\`

            ### macOS (Intel)
            \`\`\`bash
            curl -L https://github.com/redentordev/tako-cli/releases/download/$VERSION/tako-darwin-amd64 -o /usr/local/bin/tako
            chmod +x /usr/local/bin/tako
            tako --version
            \`\`\`

            ### macOS (Apple Silicon)
            \`\`\`bash
            curl -L https://github.com/redentordev/tako-cli/releases/download/$VERSION/tako-darwin-arm64 -o /usr/local/bin/tako
            chmod +x /usr/local/bin/tako
            tako --version
            \`\`\`

            ### Windows (PowerShell)
            \`\`\`powershell
            Invoke-WebRequest -Uri "https://github.com/redentordev/tako-cli/releases/download/$VERSION/tako-windows-amd64.exe" -OutFile "tako.exe"
            # Add to your PATH
            \`\`\`

            ### Container Image
            \`\`\`bash
            docker run --rm ghcr.io/redentordev/tako-cli:$VERSION --version
            \`\`\`

            ### Manual Pages
            \`\`\`bash
            gh release download $VERSION --pattern tako-manpages.tar.gz
            sudo mkdir -p /usr/local/share/man/man1
            sudo tar -xzf tako-manpages.tar.gz -C /usr/local/share/man/man1
            man tako
            \`\`\`

            ## 🚀 Quick Start

            \`\`\`bash
            tako init my-app
            tako setup -e production
            tako deploy -e production
            \`\`\`

            ## 📝 What's Changed
          EOF
            if grep -q '[^[:space:]]' commits.txt; then
              cat commits.txt
            else
              echo "Initial release"
            fi
            cat <<'EOF'

            ## 🔒 Verify Download

            Download `checksums.txt` and verify:
            ```bash
            sha256sum -c checksums.txt
            ```

            ---

            **Built by [@redentor_dev](https://twitter.com/redentor_dev)**
          EOF
          } | sed 's/^  //' > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: 🐙 Tako CLI ${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            dist/tako-linux-amd64
            dist/tako-linux-arm64
            dist/tako-darwin-amd64
            dist/tako-darwin-arm64
            dist/tako-windows-amd64.exe
            dist/tako-manpages.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "🎉 Release ${{ steps.version.outputs.VERSION }} created successfully!"
          echo ""
          echo "📦 Binaries uploaded:"
          echo "  ✅ tako-linux-amd64"
          echo "  ✅ tako-linux-arm64"
          echo "  ✅ tako-darwin-amd64"
          echo "  ✅ tako-darwin-arm64"
          echo "  ✅ tako-windows-amd64.exe"
          echo "  ✅ tako-manpages.tar.gz"
          echo "  ✅ checksums.txt"
          echo "  ✅ ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} (linux/amd64, linux/arm64)"
          echo ""
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"
