project:
  name: frontend
  version: 1.0.0

servers:
  production:
    host: ${SERVER_HOST}
    user: ${SERVER_USER}
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - production
    services:
      web:
        build: .
        port: 3000
        restart: unless-stopped
        env:
          NODE_ENV: production
          API_URL:
            link:
              app: backend-api
              stage: production
              service: api
        healthCheck:
          path: /health
          interval: 10s
          timeout: 5s
          retries: 3
        # Uncomment to expose publicly through tako-proxy
        proxy:
          domain: frontend.${SERVER_HOST}.sslip.io
          email: admin@example.com
