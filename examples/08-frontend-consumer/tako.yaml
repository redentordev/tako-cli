project:
  name: frontend
  version: 1.0.0

servers:
  production:
    host: ${SERVER_HOST}
    user: ${SERVER_USER}
    sshKey: ${SSH_KEY}

imports:
  backend_api:
    project: backend-api
    environment: production
    service: api
    port: web

environments:
  production:
    servers:
      - production
    services:
      web:
        build: .
        port: 3000
        restart: unless-stopped
        env:
          NODE_ENV: production
          API_IMPORT: backend_api
          API_URL: ${BACKEND_API_URL}
        healthCheck:
          path: /health
          interval: 10s
          timeout: 5s
          retries: 3
        # Uncomment to expose publicly through tako-proxy
        proxy:
          domain: frontend.${SERVER_HOST}.sslip.io
          email: admin@example.com
