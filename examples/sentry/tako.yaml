      launchpad-taskworker:
        image: ghcr.io/getsentry/launchpad:26.6.0
        restart: unless-stopped
        command: ["worker", "--verbose"]
        env:
          LAUNCHPAD_WORKER_RPC_HOST: taskbroker:50051
          LAUNCHPAD_WORKER_CONCURRENCY: "4"
          LAUNCHPAD_WORKER_HEALTH_CHECK_FILE_PATH: /tmp/health.txt
          KAFKA_BOOTSTRAP_SERVERS: kafka:9092
          SENTRY_BASE_URL: http://web:9000
          LAUNCHPAD_ENV: self-hosted
        secrets: [LAUNCHPAD_RPC_SHARED_SECRET]
        dependsOn: [kafka, taskbroker, web]
        healthCheck:
          command: test -f /tmp/health.txt && rm /tmp/health.txt
          interval: 60s
          timeout: 10s
          retries: 3
          startPeriod: 600s

      vroom:
        image: ghcr.io/getsentry/vroom:26.6.0
        port: 8085
        restart: unless-stopped
        env:
          SENTRY_KAFKA_BROKERS_PROFILING: kafka:9092
          SENTRY_KAFKA_BROKERS_OCCURRENCES: kafka:9092
          SENTRY_BUCKET_PROFILES: s3://profiles?region=us-east-1&endpoint=seaweedfs:8333&s3ForcePathStyle=true&disableSSL=true
          AWS_ACCESS_KEY: sentry
          AWS_SECRET_KEY: sentry
          SENTRY_SNUBA_HOST: http://snuba-api:1218
        volumes: [sentry-vroom:/var/vroom/sentry-profiles]
        dependsOn: [kafka, s3-profiles-bootstrap]
        healthCheck:
          tcpPort: 8085
          interval: 30s
          timeout: 10s
          retries: 10

      uptime-checker:
        image: ghcr.io/getsentry/uptime-checker:26.6.0
        restart: unless-stopped
        command: ["run"]
        env:
          UPTIME_CHECKER_RESULTS_KAFKA_CLUSTER: kafka:9092
          UPTIME_CHECKER_REDIS_HOST: redis://redis:6379
          UPTIME_CHECKER_ALLOW_INTERNAL_IPS: "false"
          UPTIME_CHECKER_FAILURE_RETRIES: "1"
        dependsOn: [kafka, redis]

      s3-profiles-bootstrap:
        kind: run
        image: chrislusf/seaweedfs:4.17_large_disk
        entrypoint: ["/bin/sh"]
        command: ["/opt/tako/bootstrap-s3.sh"]
        env:
          SENTRY_BUCKET: profiles
          SENTRY_EVENT_RETENTION_DAYS: ${SENTRY_EVENT_RETENTION_DAYS}
        files:
          - source: ./scripts/bootstrap-s3.sh
            target: /opt/tako/bootstrap-s3.sh
        volumes: [sentry-seaweedfs:/data]
        dependsOn: [seaweedfs]
        timeout: 10m
