project:
  name: pattern-cron
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      hourly-maintenance:
        kind: job
        schedule: "0 * * * *"
        image: alpine:3.20
        command: sh -c "date -u; echo running scheduled task"
        env:
          JOB_NAME: hourly-maintenance
