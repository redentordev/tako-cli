project:
  name: pattern-fastapi
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      api:
        build: .
        port: 8000
        proxy:
          domain: fastapi.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          retries: 3
