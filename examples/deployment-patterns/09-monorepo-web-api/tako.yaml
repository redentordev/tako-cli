project:
  name: pattern-monorepo
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      web:
        build: ./web
        port: 3000
        dependsOn:
          - api
        proxy:
          domain: monorepo.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        env:
          API_URL: http://api:4000
          PORT: "3000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          retries: 3

      api:
        build: ./api
        port: 4000
        replicas: 2
        env:
          PORT: "4000"
        healthCheck:
          path: /health
          interval: 15s
          timeout: 5s
          retries: 3
