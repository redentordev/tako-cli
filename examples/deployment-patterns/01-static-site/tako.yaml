project:
  name: pattern-static
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      web:
        build: .
        port: 80
        proxy:
          domain: static.${SERVER_HOST}.sslip.io
          domains:
            - static-alt.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s
          retries: 3
