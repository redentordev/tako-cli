project:
  name: pattern-prebuilt
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      web:
        image: nginx:1.27-alpine
        port: 80
        replicas: 2
        proxy:
          domain: prebuilt.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        healthCheck:
          path: /
          interval: 30s
          timeout: 5s
          retries: 3
