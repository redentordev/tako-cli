project:
  name: pattern-go-web
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      web:
        build: .
        port: 8080
        replicas: 2
        loadBalancer:
          strategy: round_robin
        proxy:
          domain: go-web.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          retries: 3
