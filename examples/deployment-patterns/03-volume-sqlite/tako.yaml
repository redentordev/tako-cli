project:
  name: pattern-volume
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      web:
        build: .
        port: 3000
        volumes:
          - app_data:/app/data
        backup:
          schedule: "0 3 * * *"
          retain: 14
        proxy:
          domain: volume.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        env:
          DATA_DIR: /app/data
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          retries: 3
