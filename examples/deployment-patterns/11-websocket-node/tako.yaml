project:
  name: pattern-websocket
  version: 1.0.0

servers:
  prod:
    host: ${SERVER_HOST}
    user: root
    sshKey: ${SSH_KEY}

environments:
  production:
    servers:
      - prod
    services:
      realtime:
        build: .
        port: 3000
        replicas: 2
        loadBalancer:
          strategy: sticky
        proxy:
          domain: websocket.${SERVER_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          retries: 3
