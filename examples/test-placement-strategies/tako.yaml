project:
  name: placement-test
  version: "1.0.0"

runtime:
  mode: takod

mesh:
  enabled: true

state:
  backend: replicated

servers:
  node1:
    host: ${SERVER1_HOST}
    user: root
    sshKey: ${SSH_KEY}
    labels:
      role: web
  node2:
    host: ${SERVER2_HOST}
    user: root
    sshKey: ${SSH_KEY}
    labels:
      role: web

environments:
  production:
    servers:
      - node1
      - node2
    services:
      web-default:
        image: nginx:alpine
        replicas: 2
        port: 80
        proxy:
          domain: default.${SERVER1_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}

      web-spread:
        image: nginx:alpine
        replicas: 3
        port: 80
        placement:
          strategy: spread
          constraints:
            - node.labels.role==web
        proxy:
          domain: spread.${SERVER1_HOST}.sslip.io
          email: ${LETSENCRYPT_EMAIL}

      monitoring-agent:
        image: nginx:alpine
        port: 80
        placement:
          strategy: global

      pinned-api:
        image: nginx:alpine
        replicas: 1
        port: 80
        placement:
          strategy: pinned
          servers:
            - node1
